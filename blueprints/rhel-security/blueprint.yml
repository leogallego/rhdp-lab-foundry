---
name: rhel-security
description: >-
  RHEL security lab with control node and
  managed nodes for security automation
product: rhel
lab_type: zero-touch

virtualmachines:
  - name: control
    image: rhel-9.5
    memory: 4G
    cores: 2
    image_size: 30Gi
    tags:
      - key: AnsibleGroup
        value: isolated
    networks:
      - default
    services:
      - name: ssh
        ports:
          - port: 22
            protocol: TCP
            targetPort: 22
            name: ssh
      - name: cockpit
        ports:
          - port: 9090
            protocol: TCP
            targetPort: 9090
            name: cockpit
    routes:
      - name: cockpit
        host: cockpit
        service: cockpit
        targetPort: 9090
        tls: true
        tls_termination: Edge
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }
      runcmd:
        - >-
          echo "PasswordAuthentication yes"
          > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd

  - name: rhel-1
    image: rhel-9.5
    memory: 4G
    cores: 2
    image_size: 30Gi
    tags:
      - key: AnsibleGroup
        value: isolated
    networks:
      - default
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }
      runcmd:
        - >-
          echo "PasswordAuthentication yes"
          > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd

  - name: rhel-2
    image: rhel-9.5
    memory: 4G
    cores: 2
    image_size: 30Gi
    tags:
      - key: AnsibleGroup
        value: isolated
    networks:
      - default
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }
      runcmd:
        - >-
          echo "PasswordAuthentication yes"
          > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd

containers:
  - name: gitea
    image: gitea/gitea:1.16.8-rootless
    ports:
      - name: gitea
        containerPort: 3000
        protocol: TCP
    environment:
      GITEA__DEFAULT__RUN_MODE: dev
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__picture__DISABLE_GRAVATAR: "true"
      GITEA__repository__DEFAULT_PRIVATE: "false"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__SSH_DOMAIN: gitea
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__webhook__ALLOWED_HOST_LIST: "*"
    volumeMounts:
      - name: gitea-varlib
        mountPath: /var/lib/gitea/
      - name: gitea-data
        mountPath: /data/
      - name: gitea-etc
        mountPath: /etc/gitea
    volumes:
      - name: gitea-data
        emptyDir: {}
      - name: gitea-etc
        emptyDir: {}
      - name: gitea-varlib
        emptyDir: {}
    commands:
      - gitea admin user create --admin
        --username gitea --password ansible123!
        --email gitea@giteadummy.com
        --must-change-password=false
    memory: 4Gi
    services:
      - name: gitea
        ports:
          - port: 3000
            protocol: TCP
            targetPort: 3000
            name: gitea
    routes:
      - name: gitea
        host: gitea
        service: gitea
        targetPort: 3000
        tls: true
        tls_termination: Edge

ingress_ports:
  - 3000
  - 9090

tabs:
  - name: Cockpit
    url: "https://cockpit-${guid}.${domain}"
  - name: Gitea
    url: "https://gitea-${guid}.${domain}"

total_memory: 14G
total_cores: 6
