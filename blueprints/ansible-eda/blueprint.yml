  - name: rhel-1
    image: rhel-9.5
    memory: 4G
    cores: 2
    image_size: 30Gi
    tags:
      - key: AnsibleGroup
        value: isolated
    networks:
      - default
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }
      runcmd:
        - >-
          echo "PasswordAuthentication yes"
          > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd

  - name: rhel-2
    image: rhel-9.5
    memory: 4G
    cores: 2
    image_size: 30Gi
    tags:
      - key: AnsibleGroup
        value: isolated
    networks:
      - default
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }
      runcmd:
        - >-
          echo "PasswordAuthentication yes"
          > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd

containers:
  - name: gitea
    image: gitea/gitea:1.16.8-rootless
    ports:
      - name: gitea
        containerPort: 3000
        protocol: TCP
    environment:
      GITEA__DEFAULT__RUN_MODE: dev
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__picture__DISABLE_GRAVATAR: "true"
      GITEA__repository__DEFAULT_PRIVATE: "false"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__SSH_DOMAIN: gitea
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__webhook__ALLOWED_HOST_LIST: "*"
    volumeMounts:
      - name: gitea-varlib
        mountPath: /var/lib/gitea/
      - name: gitea-data
        mountPath: /data/
      - name: gitea-etc
        mountPath: /etc/gitea
    volumes:
      - name: gitea-data
        emptyDir: {}
      - name: gitea-etc
        emptyDir: {}
      - name: gitea-varlib
        emptyDir: {}
    commands:
      - gitea admin user create --admin
        --username gitea --password ansible123!
        --email gitea@giteadummy.com
        --must-change-password=false
    memory: 4Gi
    services:
      - name: gitea
        ports:
          - port: 3000
            protocol: TCP
            targetPort: 3000
            name: gitea
    routes:
      - name: gitea
        host: gitea
        service: gitea
        targetPort: 3000
        tls: true
        tls_termination: Edge

  - name: kafka
    image: docker.io/apache/kafka:latest
    ports:
      - name: kafka
        containerPort: 9092
        protocol: TCP
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: >-
        PLAINTEXT://0.0.0.0:9092,
        CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: >-
        1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    memory: 1Gi
    services:
      - name: kafka
        ports:
          - port: 9092
            protocol: TCP
            targetPort: 9092
            name: kafka

  - name: alertmanager
    image: quay.io/prometheus/alertmanager:latest
    ports:
      - name: alertmanager
        containerPort: 9093
        protocol: TCP
    memory: 512Mi
    services:
      - name: alertmanager
        ports:
          - port: 9093
            protocol: TCP
            targetPort: 9093
            name: alertmanager
    routes:
      - name: alertmanager
        host: alertmanager
        service: alertmanager
        targetPort: 9093
        tls: true
        tls_termination: Edge

  - name: prometheus
    image: quay.io/prometheus/prometheus:latest
    ports:
      - name: prometheus
        containerPort: 9090
        protocol: TCP
    memory: 512Mi
    services:
      - name: prometheus
        ports:
          - port: 9090
            protocol: TCP
            targetPort: 9090
            name: prometheus
    routes:
      - name: prometheus
        host: prometheus
        service: prometheus
        targetPort: 9090
        tls: true
        tls_termination: Edge

  - name: mattermost
    image: >-
      docker.io/mattermost/
      mattermost-team-edition:latest
    ports:
      - name: mattermost
        containerPort: 8065
        protocol: TCP
    memory: 1Gi
    services:
      - name: mattermost
        ports:
          - port: 8065
            protocol: TCP
            targetPort: 8065
            name: mattermost
    routes:
      - name: mattermost
        host: mattermost
        service: mattermost
        targetPort: 8065
        tls: true
        tls_termination: Edge

ingress_ports:
  - 3000
  - 8065
  - 9090
  - 9092
  - 9093

tabs:
  - name: AAP Controller
    url: "https://control-${guid}.${domain}"
  - name: Gitea
    url: "https://gitea-${guid}.${domain}"
  - name: Prometheus
    url: "https://prometheus-${guid}.${domain}"
  - name: Alertmanager
    url: "https://alertmanager-${guid}.${domain}"
  - name: Mattermost
    url: "https://mattermost-${guid}.${domain}"

total_memory: 44G
total_cores: 8
