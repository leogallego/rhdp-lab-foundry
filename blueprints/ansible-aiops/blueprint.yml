---
name: ansible-aiops
description: >-
  AIOps lab with AAP, EDA, RHEL AI,
  Splunk, Mattermost, and Gitea
product: ansible
lab_type: zero-touch

virtualmachines:
  - name: control
    image: aap-2.6-2-ceh-20251103
    memory: 16Gi
    cores: 4
    image_size: 50Gi
    services:
      - name: control-https
        ports:
          - port: 443
            protocol: TCP
            targetPort: 443
            name: control-https
    routes:
      - name: control
        host: control
        service: control-https
        targetPort: 443
        tls: true
        tls_termination: reencrypt
    tags:
      - key: AnsibleGroup
        value: control

  - name: rhel-ai
    image: rhel-ai-94
    memory: 16Gi
    cores: 4
    image_size: 100Gi
    services:
      - name: inference
        ports:
          - port: 8443
            protocol: TCP
            targetPort: 8443
            name: inference
    routes:
      - name: rhel-ai
        host: rhel-ai
        service: inference
        targetPort: 8443
        tls: true
        tls_termination: Edge
    tags:
      - key: AnsibleGroup
        value: ai

  - name: rhel-1
    image: rhel-9.5
    memory: 4Gi
    cores: 2
    image_size: 30Gi
    tags:
      - key: AnsibleGroup
        value: managed_nodes

containers:
  - name: gitea
    image: gitea/gitea:1.16.8-rootless
    ports:
      - name: gitea
        containerPort: 3000
        protocol: TCP
    environment:
      GITEA__DEFAULT__RUN_MODE: dev
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__picture__DISABLE_GRAVATAR: "true"
      GITEA__repository__DEFAULT_PRIVATE: "false"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__SSH_DOMAIN: gitea
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__webhook__ALLOWED_HOST_LIST: "*"
    volumeMounts:
      - name: gitea-varlib
        mountPath: /var/lib/gitea/
      - name: gitea-data
        mountPath: /data/
      - name: gitea-etc
        mountPath: /etc/gitea
    volumes:
      - name: gitea-data
        emptyDir: {}
      - name: gitea-etc
        emptyDir: {}
      - name: gitea-varlib
        emptyDir: {}
    commands:
      - >-
        gitea admin user create --admin
        --username gitea --password ansible123!
        --email gitea@giteadummy.com
        --must-change-password=false
    memory: 2Gi
    services:
      - name: gitea
        ports:
          - port: 3000
            protocol: TCP
            targetPort: 3000

  - name: kafka
    image: docker.io/apache/kafka:latest
    ports:
      - name: kafka
        containerPort: 9092
        protocol: TCP
    memory: 1Gi
    services:
      - name: kafka
        ports:
          - port: 9092
            protocol: TCP
            targetPort: 9092

  - name: mattermost
    image: >-
      docker.io/mattermost/
      mattermost-team-edition:latest
    ports:
      - name: mattermost
        containerPort: 8065
        protocol: TCP
    memory: 1Gi
    services:
      - name: mattermost
        ports:
          - port: 8065
            protocol: TCP
            targetPort: 8065

  - name: splunk
    image: docker.io/splunk/splunk:latest
    ports:
      - name: splunk-web
        containerPort: 8000
        protocol: TCP
      - name: splunk-hec
        containerPort: 8088
        protocol: TCP
      - name: splunk-mgmt
        containerPort: 8089
        protocol: TCP
    environment:
      SPLUNK_GENERAL_TERMS: >-
        --accept-sgt-current-at-splunk-com
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_PASSWORD: "RedHat123!"
    memory: 2Gi
    services:
      - name: splunk-web
        ports:
          - port: 8000
            protocol: TCP
            targetPort: 8000
      - name: splunk-hec
        ports:
          - port: 8088
            protocol: TCP
            targetPort: 8088

ingress_ports:
  - 3000
  - 8000
  - 8065
  - 8088
  - 8443
  - 9092

tabs:
  - name: AAP Controller
    url: "https://control-${guid}.${domain}"
  - name: Gitea
    url: "https://gitea-${guid}.${domain}"
  - name: Splunk
    url: "https://splunk-web-${guid}.${domain}"
  - name: Mattermost
    url: "https://mattermost-${guid}.${domain}"
  - name: RHEL AI
    url: "https://rhel-ai-${guid}.${domain}"

total_memory: 40Gi
total_cores: 10
